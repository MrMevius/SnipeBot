name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e "./backend[dev]"

      - name: Run HEMA parser regression subset
        run: pytest backend/tests/test_adapters.py -q -k "hema"

      - name: Run backend test suite
        run: pytest backend/tests -q

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend test suite
        run: npm run test
        working-directory: frontend

      - name: Run frontend build
        run: npm run build
        working-directory: frontend
