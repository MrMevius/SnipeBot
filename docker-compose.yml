services:
  db:
    image: timescale/timescaledb:latest-pg16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${SNIPEBOT_POSTGRES_DB:-snipebot}
      POSTGRES_USER: ${SNIPEBOT_POSTGRES_USER:-snipebot}
      POSTGRES_PASSWORD: ${SNIPEBOT_POSTGRES_PASSWORD:-snipebot}
    ports:
      - "${SNIPEBOT_POSTGRES_BIND:-127.0.0.1}:${SNIPEBOT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SNIPEBOT_POSTGRES_USER:-snipebot} -d ${SNIPEBOT_POSTGRES_DB:-snipebot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  api:
    image: snipebot-backend:latest
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      SNIPEBOT_DB_URL: ${SNIPEBOT_DB_URL:-sqlite:////data/snipebot.db}
    command: ["uvicorn", "snipebot.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - sqlite_data:/data
    ports:
      - "${SNIPEBOT_API_BIND:-127.0.0.1}:${SNIPEBOT_API_PORT:-8001}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    image: snipebot-backend:latest
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      SNIPEBOT_DB_URL: ${SNIPEBOT_DB_URL:-sqlite:////data/snipebot.db}
    command: ["python", "-m", "snipebot.worker"]
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from snipebot.persistence.db import check_db_ready; raise SystemExit(0 if check_db_ready() else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${SNIPEBOT_FRONTEND_BIND:-0.0.0.0}:${SNIPEBOT_FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlite_data:
  postgres_data:
