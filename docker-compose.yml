services:
  api:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      SNIPEBOT_DB_URL: ${SNIPEBOT_DB_URL:-sqlite:////data/snipebot.db}
    command: ["uvicorn", "snipebot.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/src:/app/backend/src
      - sqlite_data:/data
    ports:
      - "${SNIPEBOT_API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      SNIPEBOT_DB_URL: ${SNIPEBOT_DB_URL:-sqlite:////data/snipebot.db}
    command: ["python", "-m", "snipebot.worker"]
    volumes:
      - ./backend/src:/app/backend/src
      - sqlite_data:/data
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: ["npm", "run", "dev"]
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqlite_data:
